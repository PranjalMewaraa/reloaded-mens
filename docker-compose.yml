name: menswear

services:
  postgres:
    image: postgres:16-alpine
    container_name: menswear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: menswear
      POSTGRES_PASSWORD: menswear_dev_password
      POSTGRES_DB: menswear
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U menswear']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: menswear-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
